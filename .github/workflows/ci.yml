name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  backend-lint:
    name: Backend — lint & type-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install --no-cache-dir ".[dev]"

      - name: ruff check
        run: ruff check app tests

      - name: ruff format (check only)
        run: ruff format --check app tests

      - name: mypy --strict
        run: mypy --strict app

  backend-test:
    name: Backend — unit & integration tests
    runs-on: ubuntu-latest
    needs: backend-lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: travelsearch_test
          POSTGRES_USER: travelsearch
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U travelsearch -d travelsearch_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgresql+asyncpg://travelsearch:testpassword@localhost:5432/travelsearch_test
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: test-secret-at-least-32-characters-long-for-ci
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "15"
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: "7"
      TELEGRAM_BOT_TOKEN: "0000000000:TEST_TOKEN_FOR_CI"
      TELEGRAM_WEBHOOK_SECRET: test-webhook-secret-at-least-32-chars
      PROXY_PROVIDER_HOST: "proxy.example.com:8080"
      PROXY_PROVIDER_USER: proxyuser
      PROXY_PROVIDER_PASS: proxypassword
      CORS_ORIGINS: "http://localhost:3000"
      APP_ENV: development
      ENABLE_RAW_SNAPSHOT: "false"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install --no-cache-dir ".[dev]"

      # Provider and notifier contract tests use recorded fixtures — no live calls
      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=app --cov-report=term-missing

  frontend-lint:
    name: Frontend — lint & type-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript strict check
        run: npx tsc --noEmit

  frontend-test:
    name: Frontend — unit tests
    runs-on: ubuntu-latest
    needs: frontend-lint
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npm test -- --run

  docker-build:
    name: Docker Compose build
    runs-on: ubuntu-latest
    needs: [backend-lint, frontend-lint]

    steps:
      - uses: actions/checkout@v4

      - name: Copy env example
        run: cp .env.example .env

      - name: Patch .env for CI (no-op placeholders are fine for build-only)
        run: |
          sed -i 's/CHANGE_ME_AT_LEAST_32_CHARS_HEX/ci-secret-placeholder-32-chars-long/g' .env
          sed -i 's/CHANGE_ME/ci-placeholder/g' .env

      - name: docker compose build
        run: docker compose build --parallel

      # Verify all images were built without errors (no runtime test — just build gate)
